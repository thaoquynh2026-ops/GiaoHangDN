function setTab(i, el) {
  tab = i;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderImg();
  document.getElementById('capText').textContent = CAPTIONS[i];
}

function renderImg() {
  const blob = new Blob([SVGS[tab]], {type:'image/svg+xml'});
  const url  = URL.createObjectURL(blob);
  document.getElementById('imgWrap').innerHTML = `<img src="${url}" alt="Quảng cáo" style="border-radius:10px;max-width:100%">`;
  document.getElementById('fbShare').href =
    `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(SITE)}`;
}

function downloadSVG() {
  const names = ['quang-cao','tuyen-quan','tuyen-tai-xe','story'];
  // Convert SVG to PNG via canvas
  const img = new Image();
  const blob = new Blob([SVGS[tab]], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const cvs = document.createElement('canvas');
    cvs.width = img.naturalWidth || (tab===3?1080:1200);
    cvs.height = img.naturalHeight || (tab===3?1920:630);
    cvs.getContext('2d').drawImage(img, 0, 0);
    const a = document.createElement('a');
    a.download = `GiaoHangDN_${names[tab]}.png`;
    a.href = cvs.toDataURL('image/png');
    a.click();
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function copyCaption() {
  const text = document.getElementById('capText').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const b = document.getElementById('btnCopy');
    b.textContent='✅ Đã copy!'; b.classList.add('ok');
    setTimeout(()=>{b.textContent='📋 Copy caption';b.classList.remove('ok');},2000);
  }).catch(()=>{
    const r=document.createRange(); r.selectNode(document.getElementById('capText'));
    window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
    document.execCommand('copy');
  });
}

renderImg();
